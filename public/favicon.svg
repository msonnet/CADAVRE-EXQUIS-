<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Fond -->
  <rect width="64" height="64" rx="12" fill="#0f0805"/>

  <!--
    FIGURE TRISECTÉE — le cadavre exquis
    3 bandes horizontales décalées comme les feuillets pliés du jeu :
      · Tête     : +5 px à droite  (cx 37)
      · Tronc    :  0  centré      (cx 32)
      · Jambes   : −5 px à gauche  (cx 27)
    Les deux coupures rouges = lignes de pliage du papier
  -->

  <!-- ── TÊTE (offset +5 → cx=37) ── -->
  <ellipse cx="37" cy="11" rx="8" ry="9" fill="#ede3ce"/>
  <!-- Cou -->
  <rect x="34" y="18" width="6" height="5" fill="#ede3ce"/>

  <!-- ── COUPURE 1 ── -->
  <line x1="4" y1="23" x2="60" y2="23"
        stroke="#c11c14" stroke-width="1.0"
        stroke-dasharray="3,1.5" opacity="0.88"/>

  <!-- ── TRONC (offset 0 → centré cx=32) — épaules larges, taille étroite ── -->
  <path d="M 14 25 L 50 25 L 45 43 L 19 43 Z" fill="#ede3ce"/>

  <!-- ── COUPURE 2 ── -->
  <line x1="4" y1="44" x2="60" y2="44"
        stroke="#c11c14" stroke-width="1.0"
        stroke-dasharray="3,1.5" opacity="0.88"/>

  <!-- ── JAMBES (offset −5 → centrées cx=27) ── -->
  <!-- Jambe gauche : x 19→26 (cx 22.5), jambe droite : x 28→35 (cx 31.5) → cx global 27 ✓ -->
  <rect x="19" y="46" width="7" height="16" rx="3" fill="#ede3ce"/>
  <rect x="28" y="46" width="7" height="16" rx="3" fill="#ede3ce"/>

</svg>
