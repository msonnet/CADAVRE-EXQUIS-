<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Fond -->
  <rect width="64" height="64" rx="12" fill="#0f0805"/>

  <!--
    PLUME D'ENCRIER — dessinée en coordonnées absolues, sans transform.
    Rachis : de (49,9) [pointe de la plume, haut-droite] à (15,57) [pointe du calame, bas-gauche].
    Vexille externe (côté bas-droite) : LARGE — barbes balayées vers le bas
    Vexille interne (côté haut-gauche) : COURT — barbes serrées, balayées vers le haut
    Calame : tuyau nu effilé, ivoire
    Asymétrie typique de la plume d'oie pour écrire.
  -->

  <!-- Vexille externe — large, lumineux -->
  <path d="M 49 9 C 53 14,54 23,49 34 C 45 42,38 47,29 50 L 25 43 Z"
        fill="#ede3ce"/>

  <!-- Vexille interne — court, ombré -->
  <path d="M 49 9 C 46 7,39 11,33 19 C 27 27,23 35,22 41 L 25 43 Z"
        fill="#dccfb5"/>

  <!-- Reflet axial vexille externe -->
  <path d="M 49 9 C 51 15,51 24,47 33 C 44 39,39 44,32 47 L 29 49 L 25 43 Z"
        fill="#f8eedd" opacity="0.25"/>

  <!-- Calame (tuyau nu, ivoire doré) -->
  <path d="M 25 43 Q 20 50,15 57 Q 19 50,23 43 Z"
        fill="#ccba70"/>
  <path d="M 24 44 Q 19 51,15 57 L 16 57 Q 21 50,25 43 Z"
        fill="#e0ce82" opacity="0.4"/>

  <!-- ══ BARBES VEXILLE EXTERNE
       Partent du rachis, balayent vers bas-droite (direction du calame)
       Barbes courbées : plus longues au milieu ══ -->
  <g fill="none" stroke="#b8a268" stroke-width="0.65" stroke-linecap="round" opacity="0.88">
    <path d="M 46 13 Q 50 17,52 21"/>
    <path d="M 43 17 Q 48 22,51 27"/>
    <path d="M 40 21 Q 46 27,49 33"/>
    <path d="M 37 25 Q 44 32,46 38"/>
    <path d="M 34 29 Q 41 36,43 43"/>
    <path d="M 31 33 Q 38 40,39 46"/>
    <path d="M 28 37 Q 34 43,35 48"/>
    <path d="M 26 41 Q 31 46,32 50"/>
  </g>

  <!-- ══ BARBULES SECONDAIRES VEXILLE EXTERNE (lignes fines entre barbes) ══ -->
  <g fill="none" stroke="#c8b478" stroke-width="0.32" stroke-linecap="round" opacity="0.50">
    <path d="M 44 15 Q 48.5 19.5,51 24"/>
    <path d="M 41 19 Q 47 25,50 30"/>
    <path d="M 38 23 Q 45 29.5,47.5 35.5"/>
    <path d="M 35 27 Q 42.5 34,44.5 40.5"/>
    <path d="M 32 31 Q 39.5 38,41 44.5"/>
    <path d="M 29 35 Q 36 42,37 47"/>
    <path d="M 27 39 Q 33 44.5,33.5 49"/>
  </g>

  <!-- ══ BARBES VEXILLE INTERNE
       Partent du rachis, balayent vers haut-gauche (direction opposée)
       Plus courtes — bord d'attaque serré ══ -->
  <g fill="none" stroke="#b09060" stroke-width="0.55" stroke-linecap="round" opacity="0.70">
    <path d="M 46 13 Q 42 11,39 10"/>
    <path d="M 43 17 Q 38 14,35 13"/>
    <path d="M 40 21 Q 34 18,30 17"/>
    <path d="M 37 25 Q 30 22,27 21"/>
    <path d="M 34 29 Q 27 26,24 25"/>
    <path d="M 31 33 Q 25 30,22 29"/>
    <path d="M 28 37 Q 23 34,21 33"/>
    <path d="M 26 41 Q 22 38,20 37"/>
  </g>

  <!-- ══ BARBULES SECONDAIRES VEXILLE INTERNE ══ -->
  <g fill="none" stroke="#b09060" stroke-width="0.28" stroke-linecap="round" opacity="0.38">
    <path d="M 44 15 Q 40 13,37 12"/>
    <path d="M 41 19 Q 36 16,32 15"/>
    <path d="M 38 23 Q 32 20,28 19"/>
    <path d="M 35 27 Q 28 24,25 23"/>
    <path d="M 32 31 Q 26 28,23 27"/>
    <path d="M 29 35 Q 24 32,21 31"/>
    <path d="M 27 39 Q 22 36,20 35"/>
  </g>

  <!-- Quelques fibres libres qui s'échappent — bord de fuite externe -->
  <g fill="none" stroke="#c8b478" stroke-width="0.4" stroke-linecap="round" opacity="0.38">
    <path d="M 50 24 Q 53 28,54 32"/>
    <path d="M 47 30 Q 51 35,52 40"/>
    <path d="M 44 36 Q 48 41,48 45"/>
    <path d="M 40 42 Q 43 47,43 51"/>
  </g>

  <!-- Rachis principal -->
  <line x1="49" y1="9" x2="25" y2="43" stroke="#5a3e18" stroke-width="1.05"/>
  <!-- Extension dans le calame -->
  <line x1="25" y1="43" x2="15" y2="57" stroke="#6a4e28" stroke-width="0.7" opacity="0.75"/>
  <!-- Reflet rachis -->
  <line x1="49.4" y1="9.2" x2="25.4" y2="43.2" stroke="#c8a850" stroke-width="0.3" opacity="0.42"/>

  <!-- Contour de la plume (silhouette) -->
  <path d="M 49 9
           C 53 14,54 23,49 34
           C 45 42,38 47,29 50
           Q 22 53,15 57
           Q 19 50,23 43
           C 22 38,22 30,27 22
           C 30 15,39 8,49 9 Z"
        fill="none" stroke="#7a6040" stroke-width="0.52" opacity="0.48"/>

  <!-- Goutte d'encre à la pointe du calame -->
  <ellipse cx="15.5" cy="56.8" rx="2.2" ry="0.88"
           fill="#c11c14" opacity="0.90"
           transform="rotate(-53,15.5,56.8)"/>
  <ellipse cx="14.8" cy="56.1" rx="0.65" ry="0.32"
           fill="#f2ede2" opacity="0.36"
           transform="rotate(-53,14.8,56.1)"/>

</svg>
