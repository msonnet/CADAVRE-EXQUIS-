<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Fond -->
  <rect width="64" height="64" rx="12" fill="#0f0805"/>

  <!--
    PLUME DE CALAME — 45°, fibre très détaillée.
    Dessinée verticalement (rachis = axe y) puis rotate(45) :
    pointe en haut-droite, calame en bas-gauche.
    Densité : 11 barbes principales par côté + barbules secondaires
    + fibres libres effilées côté gauche (bord de fuite naturel).
  -->

  <g transform="rotate(45,32,32)">

    <!-- Vexille droit — bord d'attaque, convexe, lumineux -->
    <path d="M 32 5
             C 35.5 9,44 16,45 26
             C 45 35,41 42,36 47
             L 32 49 Z"
          fill="#ece3d0"/>

    <!-- Vexille gauche — bord de fuite, concave, ombré -->
    <path d="M 32 5
             C 28.5 9,20 16,19 26
             C 19 35,23 42,28 47
             L 32 49 Z"
          fill="#ddd0b8"/>

    <!-- Reflet axial droit (veinage lumineux) -->
    <path d="M 32 5 C 34 9,38 16,39 26 C 39 34,37 41,35 46 L 32 49 Z"
          fill="#f5eedd" opacity="0.28"/>

    <!-- Calame — tuyau nu, ivoire doré -->
    <path d="M 28.5 47 Q 30 54,32 62 Q 34 54,35.5 47 Q 33.5 48,32 48 Q 30.5 48,28.5 47 Z"
          fill="#d0c27a"/>
    <line x1="32" y1="47" x2="32" y2="62" stroke="#e8d888" stroke-width="0.65" opacity="0.38"/>

    <!-- ══ BARBES DROIT — 11 barbes courtes, bord serré ══ -->
    <g fill="none" stroke="#bca870" stroke-width="0.55" stroke-linecap="round" opacity="0.88">
      <path d="M 32 8  Q 34.5 9,  36.5 11"/>
      <path d="M 32 11 Q 35.5 12, 38.5 14"/>
      <path d="M 32 14 Q 36.5 15, 40 18"/>
      <path d="M 32 17 Q 37.5 18, 41.5 21"/>
      <path d="M 32 20 Q 38.5 21, 43 24"/>
      <path d="M 32 23 Q 39 24,  44 26"/>
      <path d="M 32 26 Q 39 27,  44 29"/>
      <path d="M 32 29 Q 38.5 30, 43 33"/>
      <path d="M 32 32 Q 37.5 33, 42 36"/>
      <path d="M 32 36 Q 37 37,  40 40"/>
      <path d="M 32 40 Q 36 41,  38.5 44"/>
    </g>

    <!-- ══ BARBES GAUCHE — 11 barbes, bord de fuite, légèrement + longues ══ -->
    <g fill="none" stroke="#bca870" stroke-width="0.55" stroke-linecap="round" opacity="0.68">
      <path d="M 32 8  Q 29.5 9,  27.5 11"/>
      <path d="M 32 11 Q 28.5 12, 25.5 14"/>
      <path d="M 32 14 Q 27.5 15, 24 18"/>
      <path d="M 32 17 Q 26.5 18, 22.5 21"/>
      <path d="M 32 20 Q 25.5 21, 21 24"/>
      <path d="M 32 23 Q 25 24,  20 26"/>
      <path d="M 32 26 Q 25 27,  20 29"/>
      <path d="M 32 29 Q 25.5 30, 21 33"/>
      <path d="M 32 32 Q 26.5 33, 22 36"/>
      <path d="M 32 36 Q 27 37,  24 40"/>
      <path d="M 32 40 Q 28 41,  25.5 44"/>
    </g>

    <!-- ══ BARBULES SECONDAIRES droit — entre chaque paire de barbes ══ -->
    <g fill="none" stroke="#c8b47e" stroke-width="0.35" stroke-linecap="round" opacity="0.50">
      <path d="M 32 9.5  Q 35 10.5,37 12.5"/>
      <path d="M 32 12.5 Q 36 13.5,39.5 16"/>
      <path d="M 32 15.5 Q 37 16.5,41 19.5"/>
      <path d="M 32 18.5 Q 38 19.5,42 22.5"/>
      <path d="M 32 21.5 Q 38.5 22.5,43.5 25"/>
      <path d="M 32 24.5 Q 38.5 25.5,43.5 27.5"/>
      <path d="M 32 27.5 Q 38 28.5,42.5 31"/>
      <path d="M 32 30.5 Q 37.5 31.5,41.5 34.5"/>
      <path d="M 32 34   Q 37 35,  39.5 38"/>
      <path d="M 32 38   Q 36.5 39,38.5 42"/>
    </g>

    <!-- ══ BARBULES SECONDAIRES gauche ══ -->
    <g fill="none" stroke="#c8b47e" stroke-width="0.35" stroke-linecap="round" opacity="0.38">
      <path d="M 32 9.5  Q 29 10.5,27 12.5"/>
      <path d="M 32 12.5 Q 28 13.5,24.5 16"/>
      <path d="M 32 15.5 Q 27 16.5,23 19.5"/>
      <path d="M 32 18.5 Q 26 19.5,22 22.5"/>
      <path d="M 32 21.5 Q 25.5 22.5,20.5 25"/>
      <path d="M 32 24.5 Q 25.5 25.5,20.5 27.5"/>
      <path d="M 32 27.5 Q 26 28.5,21.5 31"/>
      <path d="M 32 30.5 Q 26.5 31.5,22.5 34.5"/>
      <path d="M 32 34   Q 27 35,  24.5 38"/>
      <path d="M 32 38   Q 27.5 39,25.5 42"/>
    </g>

    <!-- ══ FIBRES LIBRES — bord de fuite gauche, effilées + légèrement divergentes ══ -->
    <g fill="none" stroke="#c8b888" stroke-width="0.4" stroke-linecap="round" opacity="0.45">
      <!-- Quelques barbes plus longues qui "s'échappent" -->
      <path d="M 23 22 Q 20.5 23,18 25"/>
      <path d="M 22 26 Q 19.5 27.5,17.5 30"/>
      <path d="M 22 30 Q 19.5 31.5,18 34"/>
      <path d="M 22 34 Q 20 36,18.5 38"/>
      <!-- Fibres fines effilées vers le calame -->
      <path d="M 25.5 43 Q 24 44.5,23 46"/>
      <path d="M 27 45  Q 25.5 46.5,24.5 48"/>
    </g>

    <!-- Rachis -->
    <line x1="32" y1="5"  x2="32" y2="62" stroke="#5a3e18" stroke-width="1.1"/>
    <!-- Reflet rachis -->
    <line x1="32.4" y1="5" x2="32.4" y2="50" stroke="#c8a850" stroke-width="0.32" opacity="0.42"/>

    <!-- Contour silhouette -->
    <path d="M 32 5
             C 35.5 9,44 16,45 26
             C 45 35,41 42,36 47
             Q 34 54,32 62
             Q 30 54,28.5 47
             C 23 42,19 35,19 26
             C 19 16,28.5 9,32 5 Z"
          fill="none" stroke="#7a6040" stroke-width="0.5" opacity="0.45"/>

    <!-- Goutte d'encre -->
    <ellipse cx="32" cy="61.2" rx="2.4" ry="1.0" fill="#c11c14" opacity="0.90"/>
    <ellipse cx="31.1" cy="60.7" rx="0.7" ry="0.38" fill="#f2ede2" opacity="0.35"/>

  </g>

</svg>
