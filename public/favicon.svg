<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <rect width="64" height="64" rx="12" fill="#0f0805"/>

  <!--
    MANNEQUIN D'ARTISTE EN BOIS ARTICULÉ
    Segments : #d4a860 (bois clair)
    Articulations : #9a6e28 (bois foncé)
    Vue frontale — tête / tronc / jambes lisibles d'un coup d'œil
  -->

  <!-- ── TRONC (dessiné en premier = fond) ── -->
  <path d="M 24 21 Q 21 27,22 34 Q 25 37,32 38 Q 39 37,42 34 Q 43 27,40 21 Z"
        fill="#d4a860"/>

  <!-- ── PELVIS ── -->
  <ellipse cx="32" cy="39" rx="8" ry="3.5" fill="#d4a860"/>

  <!-- ── BRAS GAUCHE : bras · avant-bras · main ── -->
  <rect x="19" y="22" width="5.5" height="9.5" rx="2.75" fill="#d4a860"/>
  <rect x="18.5" y="32" width="5.5" height="8"   rx="2.75" fill="#d4a860"/>
  <ellipse cx="21.5" cy="44" rx="2.5" ry="3"     fill="#d4a860"/>

  <!-- ── BRAS DROIT ── -->
  <rect x="39.5" y="22" width="5.5" height="9.5" rx="2.75" fill="#d4a860"/>
  <rect x="40"   y="32" width="5.5" height="8"   rx="2.75" fill="#d4a860"/>
  <ellipse cx="42.5" cy="44" rx="2.5" ry="3"     fill="#d4a860"/>

  <!-- ── JAMBE GAUCHE : cuisse · mollet · pied ── -->
  <rect x="25.5" y="42" width="6" height="10" rx="3" fill="#d4a860"/>
  <rect x="25.5" y="52" width="6" height="8"  rx="3" fill="#d4a860"/>
  <ellipse cx="28.5" cy="62" rx="4.5" ry="2"        fill="#d4a860"/>

  <!-- ── JAMBE DROITE ── -->
  <rect x="32.5" y="42" width="6" height="10" rx="3" fill="#d4a860"/>
  <rect x="32.5" y="52" width="6" height="8"  rx="3" fill="#d4a860"/>
  <ellipse cx="35.5" cy="62" rx="4.5" ry="2"        fill="#d4a860"/>

  <!-- ══ ARTICULATIONS (au-dessus des segments) ══ -->

  <!-- Disque de la ceinture scapulaire -->
  <ellipse cx="32" cy="21" rx="10" ry="2.2" fill="#9a6e28"/>
  <!-- Boules d'épaule -->
  <circle cx="21.5" cy="22.5" r="3.2" fill="#9a6e28"/>
  <circle cx="42.5" cy="22.5" r="3.2" fill="#9a6e28"/>

  <!-- Coudes -->
  <circle cx="21.5" cy="32" r="2.6" fill="#9a6e28"/>
  <circle cx="42.5" cy="32" r="2.6" fill="#9a6e28"/>

  <!-- Poignets -->
  <circle cx="21.5" cy="40.5" r="2"   fill="#9a6e28"/>
  <circle cx="42.5" cy="40.5" r="2"   fill="#9a6e28"/>

  <!-- Disque de taille -->
  <ellipse cx="32" cy="36" rx="5.5" ry="1.8" fill="#9a6e28"/>

  <!-- Hanches -->
  <circle cx="28.5" cy="42" r="3.2" fill="#9a6e28"/>
  <circle cx="35.5" cy="42" r="3.2" fill="#9a6e28"/>

  <!-- Genoux -->
  <circle cx="28.5" cy="52" r="3"   fill="#9a6e28"/>
  <circle cx="35.5" cy="52" r="3"   fill="#9a6e28"/>

  <!-- Chevilles -->
  <circle cx="28.5" cy="60" r="2.2" fill="#9a6e28"/>
  <circle cx="35.5" cy="60" r="2.2" fill="#9a6e28"/>

  <!-- ── COU ── -->
  <rect x="30" y="17" width="4" height="4.5" rx="2" fill="#d4a860"/>
  <!-- Disques cou -->
  <ellipse cx="32" cy="21.5" rx="4"   ry="1.3" fill="#9a6e28"/>
  <ellipse cx="32" cy="17.5" rx="3.5" ry="1.2" fill="#9a6e28"/>

  <!-- ── TÊTE ── -->
  <ellipse cx="32" cy="10" rx="6.5" ry="7.5" fill="#d4a860"/>

</svg>
