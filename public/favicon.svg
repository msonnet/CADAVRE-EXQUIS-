<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Fond -->
  <rect width="64" height="64" rx="12" fill="#0f0805"/>

  <!--
    PLUME D'OIE — vue de face, légèrement inclinée à droite (~8°) comme un calame tenu pour écrire.
    Anatomie :
      · Rachis   : nervure centrale, du sommet à la pointe du calame
      · Vexilles : surface de la plume — droit (clair) et gauche (sombre)
      · Barbes   : lignes courbes partant du rachis, inclinées vers le bas
      · Calame   : tuyau nu et lisse en bas, couleur ivoire
      · Goutte d'encre à la pointe
  -->

  <g transform="translate(32,32) rotate(8) translate(-32,-32)">

    <!-- Ombre douce -->
    <path d="M 32 4 C 36 8,43 17,43 26 C 43 35,40 44,34 51 Q 33 57,32 62 Q 31 57,30 51 C 24 44,21 35,21 26 C 21 17,28 8,32 4 Z"
          fill="#0f0805" opacity="0.4" transform="translate(2,2)"/>

    <!-- Vexille droit — côté convexe, lumineux -->
    <path d="M 32 4 C 36 8,43 17,43 26 C 43 35,40 44,34 51 Q 33 57,32 62 Z"
          fill="#ede4d0"/>

    <!-- Vexille gauche — côté concave, plus sombre -->
    <path d="M 32 4 C 28 8,21 17,21 26 C 21 35,24 44,30 51 Q 31 57,32 62 Z"
          fill="#dfd3b8"/>

    <!-- Reflet — lumière sur le dos du vexille droit -->
    <path d="M 32 4 C 34 9,38 17,39 26 C 39 33,37 41,34 48 L 33 52 L 32 55 L 32 4 Z"
          fill="#f5efe2" opacity="0.35"/>

    <!-- Calame (tuyau nu) — ivoire mat -->
    <path d="M 30.5 49 Q 31.2 55,32 62 Q 32.8 55,33.5 49 Q 32.8 50,32 50 Q 31.2 50,30.5 49 Z"
          fill="#d4c88c"/>
    <path d="M 31.5 50 Q 31.8 55,32 60 L 32 50 Z"
          fill="#e8dc9a" opacity="0.5"/>

    <!-- Barbes — vexille droit (8 courbes) -->
    <g fill="none" stroke="#a89468" stroke-width="0.7" stroke-linecap="round" opacity="0.80">
      <path d="M 32 10 Q 34.5 11,37 14"/>
      <path d="M 32 15 Q 36 16,40 19"/>
      <path d="M 32 20 Q 37.5 21,42 24"/>
      <path d="M 32 25 Q 38 26,42 28"/>
      <path d="M 32 30 Q 37.5 31,41 34"/>
      <path d="M 32 35 Q 37 36,40 39"/>
      <path d="M 32 40 Q 36 41,38 44"/>
      <path d="M 32 45 Q 34.5 46,36 48"/>
    </g>

    <!-- Barbes — vexille gauche (bord libre, légèrement plus espacées) -->
    <g fill="none" stroke="#a89468" stroke-width="0.7" stroke-linecap="round" opacity="0.65">
      <path d="M 32 10 Q 29.5 11,27 14"/>
      <path d="M 32 15 Q 28 16,24 19"/>
      <path d="M 32 20 Q 26.5 21,22 24"/>
      <path d="M 32 25 Q 26 26,22 28"/>
      <path d="M 32 30 Q 26.5 31,23 34"/>
      <path d="M 32 35 Q 27 36,24 39"/>
      <path d="M 32 40 Q 28 41,26 44"/>
      <path d="M 32 45 Q 29.5 46,28 48"/>
    </g>

    <!-- Rachis central -->
    <line x1="32" y1="4" x2="32" y2="62" stroke="#6a5230" stroke-width="1.0"/>
    <line x1="32.4" y1="4" x2="32.4" y2="54" stroke="#c0a86a" stroke-width="0.3" opacity="0.5"/>

    <!-- Contour de la plume -->
    <path d="M 32 4 C 36 8,43 17,43 26 C 43 35,40 44,34 51 Q 33 57,32 62 Q 31 57,30 51 C 24 44,21 35,21 26 C 21 17,28 8,32 4 Z"
          fill="none" stroke="#8a7050" stroke-width="0.55" opacity="0.55"/>

    <!-- Goutte d'encre à la pointe -->
    <ellipse cx="32" cy="61.5" rx="2.2" ry="0.9" fill="#c11c14" opacity="0.88"/>
    <ellipse cx="31.2" cy="61.0" rx="0.7" ry="0.35" fill="#f2ede2" opacity="0.32"/>

  </g>

</svg>
