<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <rect width="64" height="64" rx="12" fill="#0f0805"/>

  <!--
    FIGURE TRISECTÉE — cadavre exquis
    3 bandes sans décalage, chacune dessinée « par une main différente » :
      · Tête     y 2→20  : visage, oreilles, cou
      · Tronc    y 22→41 : épaules, bras, mains, col en V, boutons
      · Jambes   y 43→62 : mollets, pieds, souliers
    Deux coupures rouges à y=21 et y=42
  -->

  <!-- ══ TÊTE y=2→20 ══ -->

  <!-- Oreilles (derrière la tête) -->
  <ellipse cx="22" cy="13" rx="2.2" ry="3" fill="#e0d4b2"/>
  <ellipse cx="42" cy="13" rx="2.2" ry="3" fill="#e0d4b2"/>

  <!-- Tête : légèrement plus large aux joues -->
  <path d="M 32 3
           C 39 3,44 7,44 13
           C 44 18,39 21,32 21
           C 25 21,20 18,20 13
           C 20 7,25 3,32 3 Z"
        fill="#ede3ce"/>

  <!-- Cou -->
  <rect x="29.5" y="19.5" width="5" height="3" fill="#ede3ce"/>

  <!-- Sourcils -->
  <path d="M 26.5 9.2 Q 28.5 8.3,30.5 9"   fill="none" stroke="#7a5020" stroke-width="0.6" opacity="0.7"/>
  <path d="M 33.5 9   Q 35.5 8.3,37.5 9.2" fill="none" stroke="#7a5020" stroke-width="0.6" opacity="0.7"/>

  <!-- Yeux (iris + reflet) -->
  <circle cx="28.5" cy="11.5" r="1.7" fill="#1a1008"/>
  <circle cx="35.5" cy="11.5" r="1.7" fill="#1a1008"/>
  <circle cx="29"   cy="11"   r="0.55" fill="#f0e8d8" opacity="0.65"/>
  <circle cx="36"   cy="11"   r="0.55" fill="#f0e8d8" opacity="0.65"/>

  <!-- Nez (arête + naseaux) -->
  <path d="M 32 13 Q 31 15.5,31.2 16.5 M 32 13 Q 33 15.5,32.8 16.5"
        fill="none" stroke="#b09060" stroke-width="0.6" opacity="0.6" stroke-linecap="round"/>
  <path d="M 30.5 16.8 Q 31.2 17.5,32 17.2 Q 32.8 17.5,33.5 16.8"
        fill="none" stroke="#b09060" stroke-width="0.55" opacity="0.55"/>

  <!-- Bouche (légère courbure) -->
  <path d="M 29.5 19 Q 32 21,34.5 19"
        fill="none" stroke="#a07848" stroke-width="0.9" stroke-linecap="round"/>

  <!-- ══ COUPURE 1 ══ -->
  <line x1="5" y1="21" x2="59" y2="21" stroke="#c11c14" stroke-width="1.2"/>

  <!-- ══ TRONC y=22→41 ══ -->

  <!-- Corps (trapèze épaules larges → taille) -->
  <path d="M 21 22 L 43 22 L 40 41 L 24 41 Z" fill="#ede3ce"/>

  <!-- Bras gauche + main -->
  <path d="M 21 22 L 10 28 L 12 37 L 20 34 Z" fill="#ede3ce"/>
  <ellipse cx="11" cy="37.5" rx="2.4" ry="3" fill="#e0d4b2"/>

  <!-- Bras droit + main -->
  <path d="M 43 22 L 54 28 L 52 37 L 44 34 Z" fill="#ede3ce"/>
  <ellipse cx="53" cy="37.5" rx="2.4" ry="3" fill="#e0d4b2"/>

  <!-- Encolure en V + chemise -->
  <path d="M 28 22 L 32 29 L 36 22"
        fill="none" stroke="#c0a860" stroke-width="1" opacity="0.75" stroke-linejoin="round"/>
  <!-- Boutons verticaux -->
  <circle cx="32" cy="31"   r="1"   fill="#c0a860" opacity="0.7"/>
  <circle cx="32" cy="35.5" r="1"   fill="#c0a860" opacity="0.7"/>
  <circle cx="32" cy="40"   r="1"   fill="#c0a860" opacity="0.7"/>
  <!-- Ligne de boutonnage -->
  <line x1="32" y1="29" x2="32" y2="41" stroke="#c0a860" stroke-width="0.35" opacity="0.35"/>

  <!-- ══ COUPURE 2 ══ -->
  <line x1="3" y1="42" x2="61" y2="42" stroke="#c11c14" stroke-width="1.2"/>

  <!-- ══ JAMBES y=43→62 ══ -->

  <!-- Jambe gauche (légèrement évasée en bas) -->
  <path d="M 23 43 L 31 43 L 30 57 L 22 57 Z" fill="#ede3ce"/>
  <!-- Jambe droite -->
  <path d="M 33 43 L 41 43 L 42 57 L 34 57 Z" fill="#ede3ce"/>

  <!-- Soulier gauche -->
  <path d="M 21 57 L 30 57 Q 32 58,31 60 Q 28 62,22 62 Q 18 62,18 59 Q 18 57,21 57 Z"
        fill="#7a6030"/>
  <path d="M 23 57 L 30 57 Q 32 58,31 59 L 24 59 Z"
        fill="#9a8040" opacity="0.55"/>

  <!-- Soulier droit -->
  <path d="M 34 57 L 43 57 Q 46 57,46 59 Q 46 62,40 62 Q 34 62,33 60 Q 32 58,34 57 Z"
        fill="#7a6030"/>
  <path d="M 34 57 L 41 57 L 43 59 L 35 59 Z"
        fill="#9a8040" opacity="0.55"/>

</svg>
